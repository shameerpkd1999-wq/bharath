name: bharath_flutter
description: A premium native mobile travel planner application with AI capabilities, maps, and offline support.
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.5
  firebase_core: ^2.27.0
  firebase_auth: ^4.17.8
  cloud_firestore: ^4.15.8
  google_generative_ai: ^0.4.0
  flutter_map: ^6.1.0
  latlong2: ^0.9.0
  http: ^1.2.0
  url_launcher: ^6.2.5
  provider: ^6.1.1
  google_sign_in: ^6.2.1
  intl: ^0.19.0
  webview_flutter: ^4.7.0
  geolocator: ^11.0.0
  flutter_compass: ^0.8.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
